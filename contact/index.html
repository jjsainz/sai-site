<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-NX6T9PZV');</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — SAI.NZ</title>
  <meta name="description" content="Start a conversation. Talk to JJ when something important needs thinking through." />
  <link rel="canonical" href="https://www.sai.nz/contact/" />
  <link rel="stylesheet" href="/assets/v2/site.css" />
  <style>
    .contact-form-wrap { max-width: 520px; margin: 28px auto 0; padding: 36px 32px; background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); }
    .satellite-hero.contact-hero { background-image: linear-gradient(200deg, var(--bg-alt) 0%, var(--card) 60%); }
    html[data-theme="dark"] .satellite-hero.contact-hero { background-image: linear-gradient(200deg, var(--bg-alt) 0%, var(--surface) 60%); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="nav-inner">
      <a href="/" class="nav-logo-link" aria-label="Home"><img src="/assets/sainz-logo.svg" alt="SAI.NZ" class="nav-logo"></a>
      <div class="nav-priority" aria-label="Primary navigation">
        <a href="/philosophy/">Philosophy</a>
        <a href="/how/">Approach</a>
      </div>
      <nav class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/philosophy/">Philosophy</a>
        <a href="/how/">Approach</a>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger" aria-haspopup="true" aria-expanded="false">Partnerships</button>
          <div class="nav-dropdown-content">
            <a href="/sf/">Outsourcing</a>
            <a href="/ac/">Telephony</a>
          </div>
        </div>
        <a href="/contact/">Contact</a>
      </nav>
      <div class="nav-theme-wrap">
        <button type="button" class="theme-toggle-btn" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-option" data-theme="light">Light</span>
          <span class="theme-sep" aria-hidden="true">/</span>
          <span class="theme-option" data-theme="dark">Dark</span>
        </button>
      </div>
      <button type="button" class="nav-menu-btn" id="navMenuBtn" aria-label="Open menu" aria-expanded="false"><span class="nav-menu-icon"></span></button>
    </div>
  </header>

  <section class="satellite-hero contact-hero">
    <div class="satellite-hero-inner">
      <h1 class="page-title">Start a conversation</h1>
      <p class="section-eyebrow">Get in touch</p>
    </div>
  </section>

  <main class="page-section content-wide">
    <p class="section-lead">Talk to JJ. If something important needs thinking through, reach out. I respond to every message and will suggest a time for a no-obligation conversation.</p>

    <form class="contact-form-wrap sainz-form" name="contact" method="POST" action="/thanks/" data-netlify="true" netlify-honeypot="bot-field">
      <p style="display:none;"><input type="hidden" name="form-name" value="contact"><label>Don’t fill: <input name="bot-field"></label></p>
      <label for="contact-name">Name</label>
      <input type="text" name="name" id="contact-name" required>
      <label for="contact-email">Email</label>
      <input type="email" name="email" id="contact-email" required>
      <label for="contact-phone">Phone (optional)</label>
      <input type="tel" name="phone" id="contact-phone" placeholder="+64 21 123 4567">
      <label for="contact-discuss">What would you like to discuss? (optional)</label>
      <input type="text" name="discuss" id="contact-discuss" placeholder="e.g. clarity session, ongoing advisory">
      <label for="contact-message">Message</label>
      <textarea name="message" id="contact-message" rows="5" required></textarea>
      <button type="submit">Send message</button>
    </form>
  </main>

  <footer class="site-footer"><p>Christchurch, New Zealand</p></footer>

  <script>
    (function() {
      var root = document.documentElement;
      function getPreferredTheme() {
        if (typeof window.matchMedia !== 'undefined' && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
        if (typeof window.matchMedia !== 'undefined' && window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
        return (new Date().getHours() >= 6 && new Date().getHours() < 18) ? 'light' : 'dark';
      }
      function applyTheme(theme) {
        root.setAttribute('data-theme', theme);
        document.querySelectorAll('.theme-option').forEach(function(el) { el.classList.toggle('active', el.getAttribute('data-theme') === theme); });
      }
      var stored = typeof localStorage !== 'undefined' && localStorage.getItem('sainz-theme');
      applyTheme(stored === 'light' || stored === 'dark' ? stored : getPreferredTheme());
      document.getElementById('themeToggle').addEventListener('click', function() {
        var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        applyTheme(next);
        if (typeof localStorage !== 'undefined') localStorage.setItem('sainz-theme', next);
      });
      var menuBtn = document.getElementById('navMenuBtn');
      var navLinks = document.getElementById('navLinks');
      if (menuBtn && navLinks) {
        menuBtn.addEventListener('click', function() {
          var open = navLinks.classList.toggle('open');
          menuBtn.setAttribute('aria-expanded', open);
          menuBtn.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
        });
        navLinks.querySelectorAll('a').forEach(function(a) { a.addEventListener('click', function() { navLinks.classList.remove('open'); menuBtn.setAttribute('aria-expanded', 'false'); }); });
      }
    })();
  </script>
</body>
</html>
